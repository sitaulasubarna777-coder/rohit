<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Space Shooter: Shield Edition</title>
    <style>
        body { 
            margin: 0; background: #000; overflow: hidden; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; font-family: 'Courier New', monospace; touch-action: none; 
        }
        canvas { 
            border: 2px solid #333; display: block; box-shadow: 0 0 30px #00ffff; 
            background: #000; max-width: 100vw; max-height: 100vh;
        }
        #ui { position: absolute; top: 20px; left: 20px; color: #0ff; pointer-events: none; z-index: 5; line-height: 1.5; }
        #controls { position: absolute; bottom: 20px; right: 20px; display: flex; gap: 10px; }
        
        button { 
            padding: 12px 20px; font-family: inherit; font-weight: bold; cursor: pointer; 
            border: 2px solid #0ff; background: rgba(0, 136, 255, 0.1); color: #0ff; 
            text-transform: uppercase; -webkit-tap-highlight-color: transparent;
        }
        
        button:active { transform: scale(0.9); }
        #shieldBtn { border-color: #f0f; color: #f0f; background: rgba(255, 0, 255, 0.1); }
        
        #restartBtn { 
            position: absolute; display: none; padding: 25px 50px; background: #f00; 
            color: #fff; border: 2px solid #fff; z-index: 10; font-weight: bold; cursor: pointer; 
        }

        @media (max-width: 600px) {
            #controls button { width: 75px; height: 75px; border-radius: 50%; padding: 0; font-size: 10px; }
        }
    </style>
</head>
<body>

    <div id="ui">
        SCORE: <span id="score">0</span> | WAVE: <span id="wave">1</span><br>
        ULTRA: <span id="ability">READY</span><br>
        SHIELD: <span id="shieldStatus">READY</span>
    </div>

    <button id="restartBtn" onclick="init()">RESTART</button>
    <div id="controls">
        <button id="shieldBtn" onclick="activateShield()">SHIELD (E)</button>
        <button onclick="fireNova()">OMNI (SPACE)</button>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const waveEl = document.getElementById('wave');
const abilityEl = document.getElementById('ability');
const shieldEl = document.getElementById('shieldStatus');
const restartBtn = document.getElementById('restartBtn');

function resize() {
    canvas.width = window.innerWidth > 800 ? 800 : window.innerWidth;
    canvas.height = window.innerHeight > 600 ? 600 : window.innerHeight;
}
window.onresize = resize;
resize();

let player, bullets, enemies, bosses, score, wave, gameActive, canUseNova, canUseShield, isShieldActive, spawnTimer;
const keys = {};

function init() {
    player = { 
        x: canvas.width / 2, y: canvas.height / 2, 
        vx: 0, vy: 0, 
        accel: 0.35,      // Increased acceleration
        friction: 0.96,   // Slicker movement
        maxSpeed: 5.5,    // Much higher top speed
        angle: 0 
    };
    bullets = []; enemies = []; bosses = [];
    score = 0; wave = 1; gameActive = true; 
    canUseNova = true; canUseShield = true; isShieldActive = false;
    
    restartBtn.style.display = "none";
    if (spawnTimer) clearTimeout(spawnTimer);
    spawnEnemy();
    gameLoop();
}

// Input Handlers
window.onkeydown = e => keys[e.code] = true;
window.onkeyup = e => keys[e.code] = false;
window.onmousemove = e => {
    const r = canvas.getBoundingClientRect();
    player.angle = Math.atan2(e.clientY - r.top - player.y, e.clientX - r.left - player.x);
};
window.onclick = (e) => { if(gameActive && e.target.tagName !== 'BUTTON') fireBullet(player.angle); };
window.addEventListener('keydown', e => { 
    if(e.code === 'Space') fireNova();
    if(e.code === 'KeyE') activateShield();
});

// Mobile Controls
window.addEventListener('touchmove', e => {
    const touch = e.touches[0];
    const r = canvas.getBoundingClientRect();
    const dx = touch.clientX - r.left - player.x;
    const dy = touch.clientY - r.top - player.y;
    player.vx += (dx / 150) * player.accel;
    player.vy += (dy / 150) * player.accel;
    player.angle = Math.atan2(dy, dx);
}, {passive: false});

function fireBullet(ang) {
    bullets.push({ x: player.x, y: player.y, v: { x: Math.cos(ang) * 16, y: Math.sin(ang) * 16 } });
}

function fireNova() {
    if (!canUseNova || !gameActive) return;
    canUseNova = false;
    abilityEl.innerText = "CHARGING...";
    for(let i = 0; i < 24; i++) fireBullet((Math.PI * 2 / 24) * i);
    setTimeout(() => { canUseNova = true; abilityEl.innerText = "READY"; }, 5000);
}

function activateShield() {
    if (!canUseShield || !gameActive) return;
    canUseShield = false;
    isShieldActive = true;
    shieldEl.innerText = "ACTIVE";
    shieldEl.style.color = "#f0f";
    
    // Shield Duration
    setTimeout(() => {
        isShieldActive = false;
        shieldEl.innerText = "COOLDOWN";
        shieldEl.style.color = "#f00";
    }, 3000);

    // Shield Cooldown
    setTimeout(() => {
        canUseShield = true;
        shieldEl.innerText = "READY";
        shieldEl.style.color = "#0ff";
    }, 10000);
}

function spawnEnemy() {
    if (!gameActive) return;
    if (score > 0 && score % 200 === 0 && bosses.length === 0) {
        bosses.push({ x: canvas.width/2, y: -60, size: 50, hp: 45, speed: 0.8, color: "#f0f" });
    }
    const side = Math.random() < 0.5;
    const x = side ? (Math.random() < 0.5 ? -30 : canvas.width + 30) : Math.random() * canvas.width;
    const y = side ? Math.random() * canvas.height : (Math.random() < 0.5 ? -30 : canvas.height + 30);
    enemies.push({ x, y, speed: 1.3 + (wave * 0.15), color: `hsl(${wave * 50}, 100%, 50%)` });
    spawnTimer = setTimeout(spawnEnemy, Math.max(250, 1400 - (wave * 120)));
}

function updatePlayer() {
    if (keys.KeyW || keys.ArrowUp) player.vy -= player.accel;
    if (keys.KeyS || keys.ArrowDown) player.vy += player.accel;
    if (keys.KeyA || keys.ArrowLeft) player.vx -= player.accel;
    if (keys.KeyD || keys.ArrowRight) player.vx += player.accel;

    player.vx *= player.friction; player.vy *= player.friction;
    
    const currentSpeed = Math.hypot(player.vx, player.vy);
    if (currentSpeed > player.maxSpeed) {
        player.vx = (player.vx / currentSpeed) * player.maxSpeed;
        player.vy = (player.vy / currentSpeed) * player.maxSpeed;
    }
    player.x += player.vx; player.y += player.vy;

    if (player.x < 15) player.x = 15; if (player.x > canvas.width - 15) player.x = canvas.width - 15;
    if (player.y < 15) player.y = 15; if (player.y > canvas.height - 15) player.y = canvas.height - 15;
}

function gameLoop() {
    if (!gameActive) return;
    ctx.fillStyle = "rgba(0, 8, 20, 0.4)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    updatePlayer();
    wave = Math.floor(score / 200) + 1;
    scoreEl.innerText = score;
    waveEl.innerText = wave;

    // Draw Shield Visual
    if (isShieldActive) {
        ctx.strokeStyle = "#f0f";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(player.x, player.y, 25 + Math.sin(Date.now()/100)*5, 0, Math.PI*2);
        ctx.stroke();
    }

    // Draw Player
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.rotate(player.angle);
    ctx.strokeStyle = "#0ff";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(15, 0); ctx.lineTo(-12, 10); ctx.lineTo(-8, 0); ctx.lineTo(-12, -10);
    ctx.closePath();
    ctx.stroke();
    ctx.restore();

    bullets.forEach((b, i) => {
        b.x += b.v.x; b.y += b.v.y;
        ctx.strokeStyle = "#fff"; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(b.x, b.y); ctx.lineTo(b.x - b.v.x * 0.8, b.y - b.v.y * 0.8);
        ctx.stroke();
        if(b.x < -50 || b.x > canvas.width + 50 || b.y < -50 || b.y > canvas.height + 50) bullets.splice(i, 1);
    });

    [...bosses, ...enemies].forEach((unit) => {
        const d = Math.hypot(player.x - unit.x, player.y - unit.y);
        unit.x += (player.x - unit.x)/d * unit.speed;
        unit.y += (player.y - unit.y)/d * unit.speed;

        ctx.strokeStyle = unit.color || "#f00";
        ctx.lineWidth = unit.hp ? 4 : 2;
        let size = unit.size || 10;
        ctx.strokeRect(unit.x - size, unit.y - size, size * 2, size * 2);

        if (d < size + 10 && !isShieldActive) {
            gameActive = false;
            restartBtn.style.display = "block";
        }

        bullets.forEach((bull, bui) => {
            if(Math.hypot(bull.x - unit.x, bull.y - unit.y) < size + 12) {
                if(unit.hp) {
                    unit.hp--; unit.color = "#fff"; setTimeout(() => { unit.color = "#f0f"; }, 40);
                } else {
                    enemies.splice(enemies.indexOf(unit), 1);
                }
                bullets.splice(bui, 1);
                if(unit.hp === 0) { bosses.splice(bosses.indexOf(unit), 1); score += 100; }
                score += 10;
            }
        });
    });

    requestAnimationFrame(gameLoop);
}
init();
</script>
</body>
</html>
